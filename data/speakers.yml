    developers with an exceptional experience using Quarkus and its vast extension
    ecosystem.

    With extensive knowledge of the Java landscape and a dedication to improving
    the developer experience, Andy is a knowledgeable speaker on software
    engineering and open-source technologies.
- id: natachad
  name: Natacha Damevin
  profile: https://www.masupercoach.fr/
  bio: |

    Je suis Natacha Damevin, nutritionniste et naturopathe, et si j’ai bien
    appris une chose au fil des années, c’est que manger équilibré quand on a
    un rythme de vie bien chargé, ce n’est pas si simple. Entre les restos, les
    déplacements, la pression du boulot et le stress du quotidien, on a vite
    fait de laisser tomber et de se sentir à plat. Mon but ? Trouver des
    solutions qui collent à la vraie vie, sans frustration et sans prise de
    tête.

    Sans filtre et imparfaite, j’adore bouger, voyager, je suis gourmande, j’aime
    l’apéro et la raclette… Et vous savez quoi ? Ce n’est absolument pas
    incompatible avec mon métier ! Être en bonne santé, ce n’est pas vivre sous
    contraintes, c’est apprendre à trouver un équilibre qui permet de profiter de
    la vie sans culpabilité.

    J’ai aussi un autre rôle, celui de maman active à 1000 à l’heure. Entre mon
    travail, ma passion et ma vie de famille, je jongle en permanence ! Et
    justement, ça me pousse à chercher des clés concrètes pour mieux gérer son
    énergie, son stress et son alimentation au quotidien. Parce que bien manger, ce
    n’est pas juste une question de ce qu’on met dans l’assiette, c’est aussi
    savoir s’adapter à son rythme de vie, à son environnement et à son niveau de
    stress.

    En plus des accompagnements individuels, j’anime des ateliers vitalité à 360°
    avec une psychothérapeute où on mélange nutrition, équilibre émotionnel et
    bien-être. Un vrai combo pour mieux comprendre son propre fonctionnement.

    En 2017, j’ai créé un blog pour partager mes recettes et montrer qu’on pouvait
    bien manger sans se priver et surtout avec plaisir ! Depuis, j’accompagne
    celles et ceux qui veulent retrouver de l’énergie, mieux gérer leur stress et
    trouver un équilibre durable sans régime absurdes.
