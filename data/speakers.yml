- id: andyd
  name: Andy Damevin
  profile: https://x.com/ia3andy
  bio: |

    Andy, a Principal Software Engineer at Red Hat, is a seasoned Java expert
    who is enthusiastic about the Quarkus project. As a member of the core
    Quarkus team, he contributes to one of the industry's most innovative
    open-source Java projects designed for optimal cloud performance.

    As a lead of the Quarkus Web/Full-Stack story, Andy is pushing to make Quarkus
    one of the best FullStack/Web frameworks on the market. His background in Java
    and his interest in UI development allow him to bring a unique perspective to
    his work. He created well-known tools for Quarkus, such as code.quarkus.io,
